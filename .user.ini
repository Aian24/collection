; PHP settings optimized for Bluehost shared hosting
; Prevents runaway scripts from consuming all server resources
; and causing infinite loading for other users

display_errors = Off
max_execution_time = 120
max_input_time = 120
max_input_vars = 5000
memory_limit = 256M
post_max_size = 128M
session.gc_maxlifetime = 1440
session.save_path = "/var/cpanel/php/sessions/ea-php83"
upload_max_filesize = 128M
zlib.output_compression = On
max_file_uploads = 100

; Session locking optimization - use "lazy" write to reduce lock time
; session.lazy_write = 1
